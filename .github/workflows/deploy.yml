name: Deploy React Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
        env:
          CI: false

      # فرض IPv4 يقلّل أعطال "i/o timeout" عندما يحاول الـ runner الاتصال عبر IPv6 وفشل المسار.
      # إذا كان SSH على منفذ غير 22: أضف Secret باسم VPS_SSH_PORT بقيمة المنفذ (مثلاً 2222).
      - name: Deploy to VPS (SCP)
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          protocol: tcp4
          timeout: 3m
          command_timeout: 15m
          source: 'dist/*'
          target: '/var/www/hajrix.com/'
          strip_components: 1

      - name: Backend pull, migrate, build, PM2 + reload Nginx
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          protocol: tcp4
          timeout: 3m
          command_timeout: 25m
          script: |
            set -e
            if [ -d /var/www/noorix ]; then
              cd /var/www/noorix
              git pull origin main
              (cd backend && npm ci && npx prisma migrate deploy && npm run build)
              (cd backend && pm2 startOrReload ecosystem.config.cjs --update-env)
              pm2 restart hajri-menu --update-env 2>/dev/null || true
            fi
            sudo systemctl reload nginx
            echo "Deployment completed successfully!"
