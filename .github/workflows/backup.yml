name: Database Backup

on:
  schedule:
    # كل يوم الساعة 2:00 صباحاً (توقيت UTC = 5 صباحاً بتوقيت السعودية)
    - cron: '0 2 * * *'
  workflow_dispatch:
    # تشغيل يدوي من GitHub عند الحاجة

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="noorix_backup_${TIMESTAMP}.dump"

          pg_dump "$DATABASE_URL" \
            --no-owner \
            --no-acl \
            --format=custom \
            --file="$FILENAME"

          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "✅ Backup created: $FILENAME ($(du -sh $FILENAME | cut -f1))"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          # الاحتفاظ بالنسخة 90 يوماً (الحد الأقصى على الخطة المجانية)
          retention-days: 90

      - name: Cleanup old artifacts (keep last 30)
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const backups = artifacts.data.artifacts
              .filter(a => a.name.startsWith('db-backup-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            // احذف ما زاد عن آخر 30 نسخة
            for (const artifact of backups.slice(30)) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted old artifact: ${artifact.name}`);
            }
