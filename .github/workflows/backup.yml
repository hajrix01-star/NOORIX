name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Backup database
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          cat > /tmp/backup.py << 'PYEOF'
          import os, sys, subprocess, datetime, socket
          from urllib.parse import urlparse, unquote

          url = os.environ['DATABASE_URL'].split('?')[0]
          r   = urlparse(url)

          ts    = datetime.datetime.now().strftime('%Y%m%d_%H%M%S')
          fname = f'noorix_backup_{ts}.dump'

          # إجبار IPv4 — GitHub Actions لا يدعم IPv6
          try:
              ipv4 = socket.getaddrinfo(r.hostname, r.port or 5432, socket.AF_INET)[0][4][0]
              print(f'Resolved {r.hostname} -> {ipv4} (IPv4)')
          except Exception as e:
              print(f'DNS fallback to hostname: {e}')
              ipv4 = r.hostname

          env = dict(os.environ)
          env['PGPASSWORD'] = unquote(r.password or '')
          env['PGSSLMODE']  = 'require'

          cmd = [
              'pg_dump',
              f'--host={ipv4}',
              f'--port={r.port or 5432}',
              f'--username={r.username}',
              f'--dbname={r.path.lstrip("/")}',
              '--no-owner', '--no-acl', '--format=custom',
              f'--file={fname}',
          ]

          print('Starting backup...')
          result = subprocess.run(cmd, env=env)
          if result.returncode != 0:
              print('pg_dump failed', file=sys.stderr)
              sys.exit(result.returncode)

          size = os.path.getsize(fname)
          print(f'Done: {fname} ({size:,} bytes)')

          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'BACKUP_FILE={fname}\n')
          PYEOF
          python3 /tmp/backup.py

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90

      - name: Cleanup old artifacts (keep last 30)
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const backups = artifacts.data.artifacts
              .filter(a => a.name.startsWith('db-backup-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            for (const artifact of backups.slice(30)) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted: ${artifact.name}`);
            }
