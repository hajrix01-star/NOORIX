name: Database Backup → Google Drive

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Backup & upload to Google Drive
        env:
          DATABASE_URL:      ${{ secrets.SUPABASE_DB_URL }}
          GDRIVE_SCRIPT_URL: ${{ secrets.GDRIVE_SCRIPT_URL }}
        run: |
          cat > /tmp/backup.py << 'PYEOF'
          import os, sys, subprocess, datetime, socket, base64, json
          import urllib.request
          from urllib.parse import urlparse, unquote

          DB_URL    = os.environ['DATABASE_URL'].split('?')[0]
          SCRIPT_URL = os.environ['GDRIVE_SCRIPT_URL']

          r = urlparse(DB_URL)

          # ---- إجبار IPv4 ----
          try:
              ipv4 = socket.getaddrinfo(r.hostname, r.port or 5432, socket.AF_INET)[0][4][0]
              print(f'Host resolved to IPv4: {ipv4}')
          except Exception:
              ipv4 = r.hostname

          ts    = datetime.datetime.now().strftime('%Y%m%d_%H%M%S')
          fname = f'noorix_backup_{ts}.dump.gz'

          env = dict(os.environ)
          env['PGPASSWORD'] = unquote(r.password or '')
          env['PGSSLMODE']  = 'require'

          # ---- pg_dump ----
          dump_file = fname.replace('.gz', '')
          cmd = [
              'pg_dump',
              f'--host={ipv4}',
              f'--port={r.port or 5432}',
              f'--username={r.username}',
              f'--dbname={r.path.lstrip("/")}',
              '--no-owner', '--no-acl', '--format=custom',
              f'--file={dump_file}',
          ]
          print('Running pg_dump...')
          res = subprocess.run(cmd, env=env)
          if res.returncode != 0:
              print('pg_dump failed', file=sys.stderr)
              sys.exit(1)

          # ---- ضغط الملف ----
          subprocess.run(['gzip', '-9', dump_file], check=True)
          size = os.path.getsize(fname)
          print(f'Backup size: {size:,} bytes ({size//1024//1024} MB)')

          # ---- رفع إلى Google Drive ----
          with open(fname, 'rb') as f:
              content_b64 = base64.b64encode(f.read()).decode()

          payload = json.dumps({
              'filename': fname,
              'content':  content_b64,
              'company':  'full_database',
          }).encode()

          req = urllib.request.Request(
              SCRIPT_URL,
              data=payload,
              headers={'Content-Type': 'application/json'},
              method='POST',
          )
          print('Uploading to Google Drive...')
          with urllib.request.urlopen(req, timeout=120) as resp:
              result = json.loads(resp.read())

          if result.get('ok'):
              print(f"✅ Saved to Google Drive: {result['saved']}")
          else:
              print(f"❌ Upload failed: {result.get('error')}", file=sys.stderr)
              sys.exit(1)
          PYEOF
          python3 /tmp/backup.py
