name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Parse connection URL
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          python3 - << 'EOF'
          import os
          from urllib.parse import urlparse, unquote
          url = os.environ['DATABASE_URL'].split('?')[0]
          r = urlparse(url)
          env_file = os.environ['GITHUB_ENV']
          with open(env_file, 'a') as f:
              f.write(f"DB_HOST={r.hostname}\n")
              f.write(f"DB_PORT={r.port or 5432}\n")
              f.write(f"DB_USER={r.username}\n")
              f.write(f"DB_NAME={r.path.lstrip('/')}\n")
              f.write(f"PGPASSWORD={unquote(r.password or '')}\n")
          print("Connection params parsed successfully")
          EOF

      - name: Run pg_dump
        env:
          PGPASSWORD: ${{ env.PGPASSWORD }}
          PGSSLMODE: require
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="noorix_backup_${TIMESTAMP}.dump"

          pg_dump \
            --host="$DB_HOST" \
            --port="$DB_PORT" \
            --username="$DB_USER" \
            --dbname="$DB_NAME" \
            --no-owner \
            --no-acl \
            --format=custom \
            --file="$FILENAME"

          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV
          echo "Backup: $FILENAME ($(du -sh $FILENAME | cut -f1))"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.BACKUP_FILE }}
          retention-days: 90

      - name: Cleanup old artifacts (keep last 30)
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const backups = artifacts.data.artifacts
              .filter(a => a.name.startsWith('db-backup-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            for (const artifact of backups.slice(30)) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted: ${artifact.name}`);
            }
